name: default-agent-instruction-pack
version: 0.4.10
description: Portable starter pack for multi-agent coding assistants with deterministic wiki reminder hooks.

entry_files:
  - path: packs/default/root/AGENTS.md
    target_path: AGENTS.md
    purpose: Cross-agent project instructions.
  - path: packs/default/root/CLAUDE.md
    target_path: CLAUDE.md
    purpose: Claude Code project memory.
  - path: packs/default/root/GEMINI.md
    target_path: GEMINI.md
    purpose: Gemini CLI context.
  - path: packs/default/root/.github/copilot-instructions.md
    target_path: .github/copilot-instructions.md
    purpose: GitHub Copilot repository instructions.

shared_sources:
  - path: ai/shared/agent-operating-contract.md
    purpose: Canonical shared behavior.
  - path: packs/default/ai/workflows/workflow-dispatch.md
    purpose: Lightweight workflow dispatcher and complexity routing.
  - path: packs/default/ai/workflows/requirement-planning.md
    purpose: Requirement planning, local workspace, baseline verification, branch, and handoff workflow.
  - path: packs/default/ai/workflows/wiki-documentation.md
    purpose: Project wiki lookup, maintenance, and lint workflow.
  - path: packs/default/ai/workflows/architecture.md
    purpose: Architecture context, boundary, data-flow, and decision guidance.
  - path: packs/default/ai/workflows/command-execution.md
    purpose: Terminal command output discipline and token optimization.
  - path: packs/default/ai/workflows/systematic-debugging.md
    purpose: Evidence-first diagnosis and root-cause fix workflow for bugs and regressions.
  - path: packs/default/ai/workflows/ci-validation.md
    purpose: CI discovery and validation expectations before finishing work.
  - path: packs/default/ai/workflows/testing-quality.md
    purpose: QA-minded testing guidance.
  - path: packs/default/ai/workflows/code-review.md
    purpose: Two-pass final self-review and PR review guidance.
  - path: packs/default/ai/workflows/vibe-coding-translation.md
    purpose: Translation of non-developer or vibe-style requests into concrete requirements.
  - path: packs/default/ai/skills/handoff/SKILL.md
    purpose: Requirement-workspace handoff skill for refreshing PLAN.md and FINDINGS.md.
  - path: packs/default/ai/skills/interview-questions/SKILL.md
    purpose: Proportional user interview skill for requirement planning and direct plan stress-testing.

adoption:
  script: scripts/install-adapter.sh
  docs:
    - ai/docs/adoption-playbook.md
    - ai/docs/sync-strategy.md
    - ai/docs/agent-discovery-matrix.md
  templates:
    - packs/default/ai/templates/requirement/PLAN.md
    - packs/default/ai/templates/requirement/FINDINGS.md
    - packs/default/ai/templates/wiki/index.md
    - packs/default/ai/templates/wiki/log.md
    - packs/default/ai/templates/wiki/page.md
  helper_scripts:
    - packs/default/ai/scripts/start-requirement.sh
    - packs/default/ai/scripts/requirement-status.sh
    - packs/default/ai/scripts/list-requirements.sh
    - packs/default/ai/scripts/lint-requirements.sh
    - packs/default/ai/scripts/audit-adoption.sh
    - packs/default/ai/scripts/wiki-lint.sh
    - packs/default/ai/scripts/wiki-reminder-context.sh
    - packs/default/ai/scripts/wiki-reminder-hook.sh

  prompts:
    - packs/default/ai/prompts/adoption/adopt-pack.md
    - packs/default/ai/prompts/adoption/update-pack.md
  target_paths:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - .claude/settings.json
    - .codex/hooks.json
    - .gemini/settings.json
    - .github/copilot-instructions.md
    - .github/hooks/wiki-reminder.json
    - .github/instructions/wiki.instructions.md
    - .github/instructions/architecture.instructions.md
    - .github/instructions/ci-validation.instructions.md
    - .github/instructions/testing-quality.instructions.md
    - .github/instructions/code-review.instructions.md
    - .github/instructions/interview-questions.instructions.md
    - .claude/commands/start-requirement.md
    - .claude/skills/handoff/SKILL.md
    - .claude/skills/interview-questions/SKILL.md
    - .gemini/skills/handoff/SKILL.md
    - .gemini/skills/interview-questions/SKILL.md
    - ai/README.md
    - ai/pack.yaml
    - ai/skills/handoff/SKILL.md
    - ai/skills/handoff/agents/openai.yaml
    - ai/skills/interview-questions/SKILL.md
    - ai/skills/interview-questions/agents/openai.yaml
    - ai/workflows/workflow-dispatch.md
    - ai/workflows/requirement-planning.md
    - ai/workflows/wiki-documentation.md
    - ai/workflows/architecture.md
    - ai/workflows/command-execution.md
    - ai/workflows/systematic-debugging.md
    - ai/workflows/ci-validation.md
    - ai/workflows/testing-quality.md
    - ai/workflows/code-review.md
    - ai/workflows/vibe-coding-translation.md
    - ai/templates/requirement/PLAN.md
    - ai/templates/requirement/FINDINGS.md
    - ai/templates/wiki/index.md
    - ai/templates/wiki/log.md
    - ai/templates/wiki/page.md
    - ai/scripts/start-requirement.sh
    - ai/scripts/requirement-status.sh
    - ai/scripts/list-requirements.sh
    - ai/scripts/lint-requirements.sh
    - ai/scripts/audit-adoption.sh
    - ai/scripts/wiki-lint.sh
    - ai/scripts/wiki-reminder-context.sh
    - ai/scripts/wiki-reminder-hook.sh
    - wiki/index.md
    - wiki/log.md
    - wiki/architecture/system-overview.md
    - wiki/architecture/tech-stack.md
    - wiki/architecture/data-flow.md
    - wiki/architecture/integration-points.md
    - wiki/architecture/decisions.md
    - wiki/domain/ubiquitous-language.md
    - wiki/guides/testing.md
